<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expand</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: transparent;
        }

        button {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(99,102,241,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 28px rgba(99,102,241,0.6);
        }
    </style>
</head>
<body>

    <button onclick="sendMessage()">Expand Dashboard</button>

    <script>
        function sendMessage() {
            // Send message up to parent website
            window.parent.postMessage({ action: 'openModal', url: 'https://public.tableau.com/views/Dashboard1-ACCAN_17738327120840/Dashboard5?:showVizHome=no&toolbar=no' }, '*');
        }
    </script>

</body>
</html>
